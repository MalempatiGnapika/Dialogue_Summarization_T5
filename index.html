<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SmartSummarizer AI</title>

<style>

body{
    font-family:Arial,sans-serif;
    margin:0;
    padding:0;
    background:linear-gradient(135deg,#EFF6FF,#DBEAFE);
    color:#333;
}

.container{
    max-width:700px;
    margin:50px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    color:#2563EB;
    margin-bottom:5px;
}

h3{
    text-align:center;
    color:#555;
    margin-top:0;
    margin-bottom:30px;
}

p{
    font-size:16px;
}

textarea{
    width:100%;
    height:180px;
    padding:12px;
    font-size:16px;
    border-radius:8px;
    border:1px solid #ccc;
    resize:vertical;
    box-sizing:border-box;
}

button{
    background:#2563EB;
    color:white;
    border:none;
    padding:12px;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#1E40AF;
}

.button-group{
    display:flex;
    gap:10px;
    margin-top:15px;
}

.button-group button{
    flex:1;
}

#summary-output{
    margin-top:25px;
    padding:18px;
    border-radius:10px;
    background:#F8FAFC;
    border:1px solid #CBD5E1;
}

#summary-heading{
    color:#2563EB;
    margin-top:0;
}

#summary-text{
    white-space:pre-wrap;
}

.footer{
    margin-top:30px;
    text-align:center;
    color:#777;
    font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<h1>SmartSummarizer AI</h1>

<h3>Powered by Fine-Tuned T5 Model For Dialogue Summarization</h3>

<p>
Paste or type your text below and generate an AI-powered summary instantly.
</p>

<form id="summarization-form">

<textarea
id="dialogue-input"
placeholder="Enter your content here..."
required></textarea>

<button type="submit">
Generate AI Summary
</button>

</form>

<div id="summary-output">

<h3 id="summary-heading">
Generated Summary
</h3>

<p id="summary-text"></p>

<div class="button-group">

<button type="button" id="copy-btn">
Copy Summary
</button>

<button type="button" id="clear-btn">
Clear
</button>

</div>

</div>

<div class="footer">

Developed by Malempati Gnapika

</div>

</div>

<script>

const form=document.getElementById("summarization-form");
const dialogueInput=document.getElementById("dialogue-input");
const summaryText=document.getElementById("summary-text");

form.addEventListener("submit",async(e)=>{

e.preventDefault();

const dialogue=dialogueInput.value.trim();

if(!dialogue){
alert("Please enter some text.");
return;
}

summaryText.innerHTML="Generating summary...";

const submitButton=form.querySelector("button");

submitButton.disabled=true;

try{

const response=await fetch("/summarize/",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
dialogue
})

});

if(!response.ok){

throw new Error("Server Error");

}

const data=await response.json();

summaryText.innerHTML=data.summary;

}

catch(error){

summaryText.innerHTML=
"Error: "+error.message;

}

finally{

submitButton.disabled=false;

}

});

document.getElementById("copy-btn").onclick=function(){

navigator.clipboard.writeText(summaryText.innerText);

alert("Summary copied successfully!");

};

document.getElementById("clear-btn").onclick=function(){

dialogueInput.value="";

summaryText.innerHTML="";

};

</script>

</body>

</html>
